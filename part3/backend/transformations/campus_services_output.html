<!DOCTYPE HTML><html xmlns:ad="advance.com" xmlns:ba="basic.com">
   <head>
      <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
      <style>
                    body {
                        font-family: sans-serif;
                        background-color: #d1d8e0; 
                        display: flex;
                        flex-wrap: wrap; /* Allow cards to move to the next line*/
                        gap: 20px;
                        padding: 20px;
                    }

                    .card { 
                        width: 400px;
                        background: white;
                        border-radius: 25px;
                       /* overflow: hidden; */
                        box-shadow: 10px 10px 10px rgba(0,0,0,0.2);
                    }

                    .header { 
                        background-color: #3CB371;
                        color: white;
                        padding: 20px; 
                        position: relative;
                        border-radius: 25px 25px 0 0;
                    }

                    .header h1 {
                        margin: 0;
                        font-size: 24px;
                        text-transform: uppercase; 
                    }

                    .header .id {
                        position: absolute;
                        right: 20px;
                        top: 20px;
                        font-weight: bold;
                        opacity: 0.7; 
                    }

                    .header .types { 
                        margin-top: 5px;
                        font-size: 12px;
                        font-weight: bold;
                        text-transform: uppercase;
                    }

                    /* Image Container styling */
                    .imgs {
                        display: flex;
                        justify-content: space-around;
                        margin-top: 15px;
                    }
                    
                    .imgs img {
                        width: 80px;
                        height: 80px;
                        image-rendering: pixelated;
                    }

                    .content {
                        padding: 20px;
                        border-radius: 25px;
                    }

                    .section-title {
                        font-weight: bold;
                        font-size: 18px;
                        margin: 15px 0 5px 0;
                        color: #2c3e50;
                    }

                    table {
                        width: 100%;
                        border-collapse: collapse; 
                        font-size: 14px;
                    }

                    td { 
                        padding: 4px 0;
                    }

                    .label {
                        color: #999;
                        width: 40%;
                    }

                    hr { 
                        order: 0;
                        border-top: 1px solid #eee;
                        margin: 10px 0;
                    }

                    .evo-row {
                        display: flex;
                        justify-content: space-around;
                        margin-top: 10px;
                    }

                    .evo-row img {
                        width: 70px;
                        height: 70px;
                        image-rendering: pixelated;
                    }

                    hr {
                        border-color: black;
                    }
                </style>
   </head>
   <body></body>
</html>
