<!DOCTYPE HTML><html>
   <head>
      <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
      <title>Student Records</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          margin: 40px;
        }

        h1 {
          text-align: center;
          color: #38bdf8;
          text-shadow: 0 0 10px rgba(56,189,248,0.6);
          margin-bottom: 30px;
        }

        table {
          width: 80%;
          margin: 0 auto;
          border-collapse: collapse;
          background: #1e293b;
          box-shadow: 0 0 20px rgba(0,0,0,0.5);
          border-radius: 8px;
          overflow: hidden;
        }

        th {
          background: #38bdf8;
          color: #0f172a;
          text-transform: uppercase;
          letter-spacing: 1px;
          padding: 12px;
        }

        td {
          padding: 10px;
          text-align: center;
          border-bottom: 1px solid #334155;
        }

        tr:nth-child(even) {
          background: #1e293b;
        }

        tr:nth-child(odd) {
          background: #0f172a;
        }

        tr:hover {
          background: #334155;
          transition: 0.3s;
        }
      </style>
   </head>
   <body>
      <h1>Student Records</h1>
      <table>
         <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Program</th>
            <th>Year</th>
         </tr>
         <tr>
            <td>S005</td>
            <td>Anne Green</td>
            <td>Verterinary Science</td>
            <td>4</td>
         </tr>
      </table>
   </body>
</html>
